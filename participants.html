<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Participants - Hackathon Dashboard</title>
    <meta name="description" content="View all participants in tabular form">
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        }
    </style>
</head>
<body class="bg-gray-50">
    <!-- Navigation -->
    <nav class="bg-white shadow-lg">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center">
                    <i class="fas fa-trophy text-red-600 text-xl sm:text-2xl mr-2 sm:mr-3"></i>
                    <h1 class="text-base sm:text-lg lg:text-xl font-bold text-gray-900">Participants</h1>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div class="bg-white rounded-lg shadow p-4 sm:p-6">
            <h2 class="text-xl sm:text-2xl font-bold mb-4 text-gray-800">Participants Table</h2>
            <div class="overflow-x-auto">
                <table class="min-w-full table-auto">
                    <thead>
                        <tr class="bg-gray-50">
                            <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Avatar</th>
                            <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Username</th>
                            <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Merged PRs</th>
                            <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Total PRs</th>
                            <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Reviews</th>
                        </tr>
                    </thead>
                    <tbody id="participants-table-body" class="bg-white divide-y divide-gray-200">
                        <!-- Data will be inserted here -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-white border-t mt-12">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6 text-center text-gray-600">
            <p>Powered by <a href="https://github.com/OWASP-BLT/BLT-Hackathons" class="text-red-600 hover:underline" target="_blank" rel="noopener noreferrer">BLT-Hackathons</a></p>
        </div>
    </footer>

    <script>
        // Get hackathon slug from URL or default
        const urlParams = new URLSearchParams(window.location.search);
        const slug = urlParams.get('slug') || 'may-2025-hackathon'; // Default to one of the hackathons

        async function loadParticipants() {
            try {
                const response = await fetch(`hackathon-data/${slug}.json`);
                const data = await response.json();
                const stats = data.stats || {};
                const leaderboard = stats.leaderboard || [];
                const reviewLeaderboard = stats.reviewLeaderboard || [];

                // Combine and deduplicate participants
                const participants = new Map();
                [...leaderboard, ...reviewLeaderboard].forEach(p => {
                    if (!participants.has(p.username)) {
                        participants.set(p.username, p);
                    } else {
                        // Merge data if exists in both
                        const existing = participants.get(p.username);
                        existing.mergedCount = Math.max(existing.mergedCount || 0, p.mergedCount || 0);
                        existing.prCount = Math.max(existing.prCount || 0, p.prCount || 0);
                        existing.reviewCount = Math.max(existing.reviewCount || 0, p.reviewCount || 0);
                    }
                });

                const tbody = document.getElementById('participants-table-body');
                tbody.innerHTML = '';

                Array.from(participants.values()).forEach(participant => {
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td class="px-4 py-2 whitespace-nowrap">
                            <img class="h-8 w-8 rounded-full" src="${participant.avatar}" alt="${participant.username}">
                        </td>
                        <td class="px-4 py-2 whitespace-nowrap">
                            <a href="${participant.url}" target="_blank" class="text-blue-600 hover:text-blue-800">${participant.username}</a>
                        </td>
                        <td class="px-4 py-2 whitespace-nowrap text-sm text-gray-900">${participant.mergedCount || 0}</td>
                        <td class="px-4 py-2 whitespace-nowrap text-sm text-gray-900">${participant.prCount || 0}</td>
                        <td class="px-4 py-2 whitespace-nowrap text-sm text-gray-900">${participant.reviewCount || 0}</td>
                    `;
                    tbody.appendChild(row);
                });
            } catch (error) {
                console.error('Error loading participants:', error);
                document.getElementById('participants-table-body').innerHTML = '<tr><td colspan="5" class="px-4 py-2 text-center text-gray-500">Error loading data</td></tr>';
            }
        }

        loadParticipants();
    </script>
</body>
</html>
